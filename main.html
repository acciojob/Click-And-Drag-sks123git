<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click and Drag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="cube">1</div>
    <div class="cube">2</div>
    <div class="cube">3</div>
    <div class="cube">4</div>
    <div class="cube">5</div>
    <div class="cube">6</div>
</div>

<script>
   const container = document.querySelector(".container");
const cubes = document.querySelectorAll(".cube");

let currentCube = null;
let offsetX = 0;
let offsetY = 0;

// Preserve initial grid positions
window.addEventListener("load", () => {
    cubes.forEach(cube => {
        const left = cube.offsetLeft;
        const top = cube.offsetTop;

        cube.style.position = "absolute";
        cube.style.left = left + "px";
        cube.style.top = top + "px";

        cube.addEventListener("mousedown", startDrag);
    });
});

function startDrag(e) {
    currentCube = e.target;

    currentCube.style.zIndex = "1000";

    offsetX = e.clientX - currentCube.offsetLeft;
    offsetY = e.clientY - currentCube.offsetTop;

    document.addEventListener("mousemove", drag);
    document.addEventListener("mouseup", stopDrag);
}

function drag(e) {
    if (!currentCube) return;

    const rect = container.getBoundingClientRect();

    let left = e.clientX - rect.left - offsetX;
    let top = e.clientY - rect.top - offsetY;

    left = Math.max(
        0,
        Math.min(left, container.clientWidth - currentCube.offsetWidth)
    );

    top = Math.max(
        0,
        Math.min(top, container.clientHeight - currentCube.offsetHeight)
    );

    currentCube.style.left = left + "px";
    currentCube.style.top = top + "px";
}

function stopDrag() {
    if (!currentCube) return;

    currentCube.style.zIndex = "";

    document.removeEventListener("mousemove", drag);
    document.removeEventListener("mouseup", stopDrag);

    currentCube = null;
}
</script>

  </body>
</html>
